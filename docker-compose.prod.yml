services:
  postgres:
    image: pgvector/pgvector:pg17
    container_name: engram-postgres
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-engram}
      POSTGRES_USER: ${POSTGRES_USER:-engram}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}
      # Password for the read-only dashboard role, provisioned on first DB init.
      # Required in production so the role never gets a weak baked-in default;
      # use the same value in WEB_DATABASE_URL. NOTE: this is a new required var —
      # existing deployments must set it before `docker compose up`.
      WEB_DB_READONLY_PASSWORD: ${WEB_DB_READONLY_PASSWORD:?WEB_DB_READONLY_PASSWORD is required}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./docker/postgres/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
      - ./docker/postgres/10-web-readonly-role.sh:/docker-entrypoint-initdb.d/10-web-readonly-role.sh:ro
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U ${POSTGRES_USER:-engram} -d ${POSTGRES_DB:-engram}']
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    networks:
      - engram-network
    # Do not expose ports in production — mcp-server connects internally.

  redis:
    image: redis:7-alpine
    container_name: engram-redis
    environment:
      # Consumed only by the healthcheck (via REDISCLI_AUTH); the server
      # password is set through --requirepass below.
      REDIS_PASSWORD: ${REDIS_PASSWORD:?REDIS_PASSWORD is required}
    command: >
      redis-server
      --appendonly yes
      --requirepass ${REDIS_PASSWORD:?REDIS_PASSWORD is required}
    volumes:
      - redis_data:/data
    healthcheck:
      # REDISCLI_AUTH keeps the password out of argv (visible in `ps`) and out
      # of redis-cli's own "-a is insecure" warning.
      test: ['CMD-SHELL', 'REDISCLI_AUTH="$$REDIS_PASSWORD" redis-cli ping | grep -q PONG']
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    networks:
      - engram-network

  mcp-server:
    image: ghcr.io/osirison/engram/mcp-server:${IMAGE_TAG:-latest}
    build:
      context: .
      dockerfile: apps/mcp-server/Dockerfile
    container_name: engram-mcp-server
    environment:
      NODE_ENV: production
      PORT: 3000
      DEPLOYMENT_PROFILE: ${DEPLOYMENT_PROFILE:-enterprise}
      DATABASE_URL: postgresql://${POSTGRES_USER:-engram}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-engram}
      REDIS_URL: redis://:${REDIS_PASSWORD}@redis:6379
      # Local-first embeddings: point OLLAMA_URL at a host install, or start
      # the bundled service with `--profile ollama` (service DNS name below).
      EMBEDDING_PROVIDER: ${EMBEDDING_PROVIDER:-ollama}
      EMBEDDING_MODEL: ${EMBEDDING_MODEL:-}
      OLLAMA_URL: ${OLLAMA_URL:-http://ollama:11434}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      MCP_ADMIN_TOKEN: ${MCP_ADMIN_TOKEN:?MCP_ADMIN_TOKEN is required}
      MCP_TRANSPORT: streamable-http
      # Auth + rate limiting default ON in production so the published /mcp
      # port is not an unauthenticated, cross-tenant, unmetered surface.
      # AUTH_REQUIRED=true mandates JWT_SECRET (>=32 chars).
      AUTH_REQUIRED: ${AUTH_REQUIRED:-true}
      JWT_SECRET: ${JWT_SECRET:?JWT_SECRET is required (>=32 chars) when AUTH_REQUIRED=true}
      RATE_LIMIT_ENABLED: ${RATE_LIMIT_ENABLED:-true}
      # Explicit CORS allow-list; leave empty only for a trusted-network deploy.
      CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS:-}
      LOG_LEVEL: ${LOG_LEVEL:-info}
      OTEL_EXPORTER_OTLP_ENDPOINT: ${OTEL_EXPORTER_OTLP_ENDPOINT:-}
      OTEL_SERVICE_NAME: engram-mcp-server
    ports:
      # Bind to loopback by default; put a TLS-terminating reverse proxy in
      # front. Override MCP_BIND_ADDR=0.0.0.0 only behind a trusted LB.
      - '${MCP_BIND_ADDR:-127.0.0.1}:${PORT:-3000}:3000'
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ['CMD-SHELL', 'wget -qO- http://localhost:3000/health || exit 1']
      interval: 30s
      timeout: 10s
      start_period: 30s
      retries: 3
    restart: unless-stopped
    # Runtime hardening: cap resources so one leak can't OOM the host, drop all
    # Linux capabilities, and forbid privilege escalation.
    # NOTE: `deploy.resources.limits` is honored by Docker Compose v2
    # (`docker compose up`, verified against the memory limit) and Swarm. It is
    # ignored by the legacy Python `docker-compose` v1 (EOL); this project
    # targets Compose v2.
    deploy:
      resources:
        limits:
          memory: 1g
        reservations:
          memory: 256m
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges:true
    networks:
      - engram-network

  # Local embedding models (default EMBEDDING_PROVIDER=ollama). Opt-in profile —
  # start with `docker compose --profile ollama up -d`, then pull the model once:
  #   docker compose exec ollama ollama pull nomic-embed-text
  # Alternatively run Ollama on the host and set OLLAMA_URL accordingly.
  ollama:
    image: ollama/ollama:latest
    container_name: engram-ollama
    profiles: ['ollama']
    volumes:
      - ollama_data:/root/.ollama
    healthcheck:
      test: ['CMD', 'ollama', 'ls']
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 15s
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 4g
    security_opt:
      - no-new-privileges:true
    networks:
      - engram-network

volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local
  ollama_data:
    driver: local

networks:
  engram-network:
    driver: bridge
