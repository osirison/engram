name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: Test (Node ${{ matrix.node-version }})
    runs-on: ubuntu-latest

    strategy:
      matrix:
        node-version: [20.x, latest]

    services:
      postgres:
        image: pgvector/pgvector:pg17
        env:
          POSTGRES_DB: engram_test
          POSTGRES_USER: test
          POSTGRES_PASSWORD: test
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

      redis:
        image: redis:latest
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 6379:6379

      qdrant:
        image: qdrant/qdrant:v1.13.6
        ports:
          - 6333:6333

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Wait for Qdrant
        run: |
          echo "Waiting for Qdrant to be ready..."
          timeout 60 bash -c 'until curl -sf http://localhost:6333/collections; do sleep 2; done'
          echo "Qdrant is ready"

      - name: Setup pnpm
        uses: pnpm/action-setup@v2
        with:
          version: 11.4.0

      - name: Setup Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Check docs
        run: pnpm docs:check

      - name: Setup database
        run: |
          pnpm db:generate
          pnpm db:migrate:deploy
        env:
          DATABASE_URL: postgresql://test:test@localhost:5432/engram_test

      - name: Build
        run: pnpm build

      - name: Lint
        run: pnpm lint

      - name: Type check
        run: pnpm typecheck

      - name: Run tests
        run: pnpm test
        env:
          DATABASE_URL: postgresql://test:test@localhost:5432/engram_test
          REDIS_URL: redis://localhost:6379
          PGVECTOR_TEST_URL: postgresql://test:test@localhost:5432/engram_test

      - name: Run retrieval eval (baseline regression)
        run: pnpm eval

      - name: Run pgvector integration tests
        run: pnpm --filter @engram/vector-store test
        env:
          PGVECTOR_TEST_URL: postgresql://test:test@localhost:5432/engram_test

      - name: Run vector backend benchmark gate
        run: pnpm bench:ci
        env:
          DATABASE_URL: postgresql://test:test@localhost:5432/engram_test
          QDRANT_URL: http://localhost:6333

      - name: Fetch baseline benchmark artifact (main)
        run: pnpm bench:baseline:fetch
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Compare benchmark trend against main baseline
        run: pnpm bench:trend:check

      - name: Upload benchmark artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: vector-backend-benchmark-${{ matrix.node-version }}
          path: |
            artifacts/bench-results.json
            artifacts/bench-baseline.json
            artifacts/bench-trend-summary.json
          if-no-files-found: ignore

      - name: Test coverage (enforce thresholds)
        run: pnpm --filter mcp-server test:cov
        env:
          DATABASE_URL: postgresql://test:test@localhost:5432/engram_test
          REDIS_URL: redis://localhost:6379
