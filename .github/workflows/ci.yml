name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Least-privilege default for every job; `actions: read` is needed by
# bench:baseline:fetch to download the main-branch baseline artifact.
permissions:
  contents: read
  actions: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: Test (Node ${{ matrix.node-version }})
    runs-on: ubuntu-latest

    strategy:
      matrix:
        # Pinned LTS lines only: `latest` is a moving target that reddens PRs
        # on unrelated Node releases and destabilises required-check names.
        node-version: [22.x, 24.x]

    services:
      postgres:
        image: pgvector/pgvector:pg17
        env:
          POSTGRES_DB: engram_test
          POSTGRES_USER: test
          POSTGRES_PASSWORD: test
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

      redis:
        image: redis:latest
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 6379:6379

      qdrant:
        image: qdrant/qdrant:v1.13.6
        ports:
          - 6333:6333

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Wait for Qdrant
        run: |
          echo "Waiting for Qdrant to be ready..."
          timeout 60 bash -c 'until curl -sf http://127.0.0.1:6333/collections; do sleep 2; done'
          echo "Qdrant is ready"

      - name: Setup pnpm
        uses: pnpm/action-setup@v2
        with:
          version: 11.5.0

      - name: Setup Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: 'pnpm'

      - name: Install PostgreSQL 17 client (match service version)
        # The runner ships pg_dump 16, but the postgres service is pg17 and
        # pg_dump/pg_restore refuse a newer server. backup-restore.spec.ts
        # shells out to these tools, so install the matching major version.
        run: |
          curl -fsSL https://www.postgresql.org/media/keys/ACCC4CF8.asc \
            | sudo gpg --dearmor -o /etc/apt/trusted.gpg.d/pgdg.gpg
          echo "deb https://apt.postgresql.org/pub/repos/apt $(lsb_release -cs)-pgdg main" \
            | sudo tee /etc/apt/sources.list.d/pgdg.list
          sudo apt-get update
          sudo apt-get install -y postgresql-client-17
          echo "/usr/lib/postgresql/17/bin" >> "$GITHUB_PATH"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Check docs
        run: pnpm docs:check

      - name: Setup database
        run: |
          pnpm db:generate
          pnpm db:migrate:deploy
        env:
          DATABASE_URL: postgresql://test:test@localhost:5432/engram_test

      - name: Check schema/migration drift
        # Fails when schema.prisma has edits not captured by a migration —
        # otherwise such drift only surfaces if a test happens to touch the
        # changed column. `--from-migrations` replays onto SHADOW_DATABASE_URL;
        # `--exit-code` exits 2 on a non-empty diff.
        run: |
          PGPASSWORD=test psql -h localhost -U test -d engram_test \
            -c "CREATE DATABASE drift_shadow;" || true
          pnpm exec prisma migrate diff \
            --from-migrations ./prisma/migrations \
            --to-schema ./prisma/schema.prisma \
            --exit-code
        env:
          SHADOW_DATABASE_URL: postgresql://test:test@localhost:5432/drift_shadow

      - name: Build
        run: pnpm build

      - name: Lint
        run: pnpm lint

      - name: Type check
        run: pnpm typecheck

      - name: Run tests
        run: pnpm test
        env:
          DATABASE_URL: postgresql://test:test@localhost:5432/engram_test
          REDIS_URL: redis://localhost:6379
          PGVECTOR_TEST_URL: postgresql://test:test@localhost:5432/engram_test

      - name: Run e2e suites (real Postgres/Redis/Qdrant)
        # The e2e specs (incl. the ungated mcp-http-transport "linchpin" test)
        # only match test/jest-e2e.json's regex, so `pnpm test` never runs
        # them. --forceExit: open Redis handles keep Node alive after a green
        # run (see #189 notes); --runInBand: suites share one database.
        run: >-
          pnpm --filter mcp-server exec jest
          --config ./test/jest-e2e.json --no-cache --runInBand --forceExit
        env:
          E2E_ENABLED: 'true'
          NODE_ENV: test
          DATABASE_URL: postgresql://test:test@localhost:5432/engram_test
          REDIS_URL: redis://localhost:6379
          QDRANT_URL: http://127.0.0.1:6333
          EMBEDDING_PROVIDER: local
          MCP_ADMIN_TOKEN: e2e-admin-token-min-16-chars

      - name: Run retrieval eval (baseline regression)
        run: pnpm eval

      - name: Run pgvector integration tests
        run: pnpm --filter @engram/vector-store test
        env:
          PGVECTOR_TEST_URL: postgresql://test:test@localhost:5432/engram_test

      - name: Run vector backend benchmark gate
        run: pnpm bench:ci
        env:
          DATABASE_URL: postgresql://test:test@localhost:5432/engram_test
          QDRANT_URL: http://127.0.0.1:6333

      - name: Fetch baseline benchmark artifact (main)
        run: pnpm bench:baseline:fetch
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Compare benchmark trend against main baseline
        run: pnpm bench:trend:check

      - name: Upload benchmark artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: vector-backend-benchmark-${{ matrix.node-version }}
          path: |
            artifacts/bench-results.json
            artifacts/bench-baseline.json
            artifacts/bench-trend-summary.json
          if-no-files-found: ignore

      - name: Test coverage (enforce thresholds)
        run: pnpm --filter mcp-server test:cov
        env:
          DATABASE_URL: postgresql://test:test@localhost:5432/engram_test
          REDIS_URL: redis://localhost:6379

  audit:
    name: Dependency audit
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 11.5.0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22.x
          cache: 'pnpm'

      - name: Audit production dependencies
        # High+ vulnerabilities in prod deps fail the build. The workspace
        # already carries manual CVE overrides in pnpm-workspace.yaml; this
        # step surfaces the next one automatically instead of by hand.
        run: pnpm audit --prod --audit-level=high

  docker-build:
    name: Docker build (mcp-server)
    runs-on: ubuntu-latest
    needs: test

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build production image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: apps/mcp-server/Dockerfile
          push: false
          # Load the built image into the docker daemon so the smoke-test step
          # below can `docker run` it; without this the build stays in buildkit
          # and `docker run` fails with "Unable to find image locally".
          load: true
          tags: engram-mcp-server:ci-${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Smoke-test image (memory profile)
        run: |
          docker run -d \
            -e DEPLOYMENT_PROFILE=memory \
            -e MCP_TRANSPORT=streamable-http \
            -e EMBEDDING_PROVIDER=local \
            -p 13000:3000 \
            --name engram-ci-smoke \
            engram-mcp-server:ci-${{ github.sha }}
          # Poll instead of a fixed sleep: curl's --retry does not cover
          # connection resets (exit 56) from docker-proxy while the app boots.
          ok=""
          for _ in $(seq 1 30); do
            if curl -sf http://localhost:13000/health; then ok=1; break; fi
            sleep 2
          done
          echo
          echo "--- container logs ---"
          docker logs engram-ci-smoke
          docker rm -f engram-ci-smoke || true
          test -n "$ok"

      - name: Install trivy (pinned + cached)
        # Standalone setup-trivy instead of trivy-action's built-in installer
        # (#208): trivy-action v0.33.1 defaults to trivy v0.65.0, whose release
        # assets were removed upstream, so the built-in install 404s on every
        # run (the "flaky download" was actually a permanent 404). Pin a live
        # version here and cache the binary via actions/cache so post-warmup
        # runs never touch the GitHub release download at all.
        # When bumping `version`, keep it to a tag that still has release
        # assets: https://github.com/aquasecurity/trivy/releases
        uses: aquasecurity/setup-trivy@v0.3.1
        with:
          version: v0.72.0
          cache: true
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Scan image for vulnerabilities (trivy)
        # Blocking (#208): fails the build on fixable CRITICAL/HIGH findings in
        # the production image. Base-image and dep CVEs were triaged before the
        # flip (npm's vendored picomatch/sigstore CVEs are dropped from the
        # runtime image in apps/mcp-server/Dockerfile). `ignore-unfixed` keeps
        # unpatchable OS findings from reddening builds we cannot act on.
        uses: aquasecurity/trivy-action@v0.33.1
        env:
          TRIVY_GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # Primary DB mirror plus ghcr fallback so an anonymous-pull rate
          # limit on one registry cannot fail the (now blocking) scan.
          TRIVY_DB_REPOSITORY: mirror.gcr.io/aquasec/trivy-db:2,ghcr.io/aquasecurity/trivy-db:2
        with:
          image-ref: engram-mcp-server:ci-${{ github.sha }}
          format: table
          exit-code: '1'
          ignore-unfixed: true
          severity: CRITICAL,HIGH
          # Scope the (now blocking) gate to vuln scanning — exactly what was
          # triaged for #208. trivy-action leaves `scanners` empty by default,
          # which lets trivy enable secret scanning too; a secret finding is
          # CRITICAL and not covered by `ignore-unfixed`, so an unrelated PR
          # could red CI on a false positive with no allow-rule infra here.
          # Pinning it also makes the gate immune to trivy default-scanner drift.
          scanners: vuln
          # Trivy is already installed (pinned + cached) by setup-trivy above.
          skip-setup-trivy: true
