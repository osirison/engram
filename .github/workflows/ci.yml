name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: Test (Node ${{ matrix.node-version }})
    runs-on: ubuntu-latest

    strategy:
      matrix:
        node-version: [22.x, latest]

    services:
      postgres:
        image: pgvector/pgvector:pg17
        env:
          POSTGRES_DB: engram_test
          POSTGRES_USER: test
          POSTGRES_PASSWORD: test
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

      redis:
        image: redis:latest
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 6379:6379

      qdrant:
        image: qdrant/qdrant:v1.13.6
        ports:
          - 6333:6333

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Wait for Qdrant
        run: |
          echo "Waiting for Qdrant to be ready..."
          timeout 60 bash -c 'until curl -sf http://127.0.0.1:6333/collections; do sleep 2; done'
          echo "Qdrant is ready"

      - name: Setup pnpm
        uses: pnpm/action-setup@v2
        with:
          version: 11.5.0

      - name: Setup Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: 'pnpm'

      - name: Install PostgreSQL 17 client (match service version)
        # The runner ships pg_dump 16, but the postgres service is pg17 and
        # pg_dump/pg_restore refuse a newer server. backup-restore.spec.ts
        # shells out to these tools, so install the matching major version.
        run: |
          curl -fsSL https://www.postgresql.org/media/keys/ACCC4CF8.asc \
            | sudo gpg --dearmor -o /etc/apt/trusted.gpg.d/pgdg.gpg
          echo "deb https://apt.postgresql.org/pub/repos/apt $(lsb_release -cs)-pgdg main" \
            | sudo tee /etc/apt/sources.list.d/pgdg.list
          sudo apt-get update
          sudo apt-get install -y postgresql-client-17
          echo "/usr/lib/postgresql/17/bin" >> "$GITHUB_PATH"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Check docs
        run: pnpm docs:check

      - name: Setup database
        run: |
          pnpm db:generate
          pnpm db:migrate:deploy
        env:
          DATABASE_URL: postgresql://test:test@localhost:5432/engram_test

      - name: Build
        run: pnpm build

      - name: Lint
        run: pnpm lint

      - name: Type check
        run: pnpm typecheck

      - name: Run tests
        run: pnpm test
        env:
          DATABASE_URL: postgresql://test:test@localhost:5432/engram_test
          REDIS_URL: redis://localhost:6379
          PGVECTOR_TEST_URL: postgresql://test:test@localhost:5432/engram_test

      - name: Run retrieval eval (baseline regression)
        run: pnpm eval

      - name: Run pgvector integration tests
        run: pnpm --filter @engram/vector-store test
        env:
          PGVECTOR_TEST_URL: postgresql://test:test@localhost:5432/engram_test

      - name: Run vector backend benchmark gate
        run: pnpm bench:ci
        env:
          DATABASE_URL: postgresql://test:test@localhost:5432/engram_test
          QDRANT_URL: http://127.0.0.1:6333

      - name: Fetch baseline benchmark artifact (main)
        run: pnpm bench:baseline:fetch
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Compare benchmark trend against main baseline
        run: pnpm bench:trend:check

      - name: Upload benchmark artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: vector-backend-benchmark-${{ matrix.node-version }}
          path: |
            artifacts/bench-results.json
            artifacts/bench-baseline.json
            artifacts/bench-trend-summary.json
          if-no-files-found: ignore

      - name: Test coverage (enforce thresholds)
        run: pnpm --filter mcp-server test:cov
        env:
          DATABASE_URL: postgresql://test:test@localhost:5432/engram_test
          REDIS_URL: redis://localhost:6379

  docker-build:
    name: Docker build (mcp-server)
    runs-on: ubuntu-latest
    needs: test

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build production image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: apps/mcp-server/Dockerfile
          push: false
          tags: engram-mcp-server:ci-${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Smoke-test image (memory profile)
        run: |
          docker run --rm \
            -e DEPLOYMENT_PROFILE=memory \
            -e MCP_TRANSPORT=streamable-http \
            -e EMBEDDING_PROVIDER=local \
            -p 13000:3000 \
            --name engram-ci-smoke \
            engram-mcp-server:ci-${{ github.sha }} &
          sleep 10
          curl --retry 5 --retry-delay 2 -sf http://localhost:13000/health
          docker stop engram-ci-smoke || true
