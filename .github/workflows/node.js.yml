name: Deploy marketing site to GitHub Pages

on:
  push:
    branches: ['main']
    paths:
      - 'apps/marketing-site/**'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: 'pages'
  cancel-in-progress: false

jobs:
  deploy:
    env:
      MARKETING_SITE_DOMAIN: engram.events
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Pages
        uses: actions/configure-pages@v5
        with:
          cname: ${{ env.MARKETING_SITE_DOMAIN }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install dependencies
        working-directory: apps/marketing-site
        run: npm ci

      - name: Build
        working-directory: apps/marketing-site
        run: npm run build

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: apps/marketing-site/dist

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

      - name: Verify Pages custom domain binding
        uses: actions/github-script@v7
        with:
          script: |
            const expectedCname = process.env.MARKETING_SITE_DOMAIN;
            const { data } = await github.rest.repos.getPages({
              owner: context.repo.owner,
              repo: context.repo.repo,
            });

            core.info(`Pages html_url: ${data.html_url}`);
            core.info(`Pages custom domain: ${data.cname ?? '(none)'}`);
            core.info(`Pages https_enforced: ${data.https_enforced}`);

            if (data.cname !== expectedCname) {
              const runbookUrl = `https://github.com/${context.repo.owner}/${context.repo.repo}/blob/main/docs/MARKETING_SITE_DOMAIN.md`;
              core.setFailed(
                `Expected Pages custom domain '${expectedCname}', found '${data.cname ?? '(none)'}'. See ${runbookUrl} for DNS/TLS setup instructions.`,
              );
            }
