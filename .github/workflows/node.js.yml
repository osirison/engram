name: Deploy marketing site to GitHub Pages

# The marketing site is intentionally excluded from the pnpm workspace, so the
# root CI pipeline never lints or builds it. This workflow gates the Pages
# deploy behind its own `verify` job (npm ci + lint + build) and also runs
# that job on pull requests touching the site, so breakage is caught before
# main instead of during the production deploy.

on:
  push:
    branches: ['main']
    paths:
      - 'apps/marketing-site/**'
      # The developer docs (WP6) build into the same Pages artifact under
      # `/docs`, so docs changes must also trigger the combined deploy.
      - 'apps/docs/**'
  pull_request:
    branches: ['main']
    paths:
      - 'apps/marketing-site/**'
      - 'apps/docs/**'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  verify:
    name: Lint & build (marketing-site)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: apps/marketing-site/package-lock.json

      - name: Install dependencies
        working-directory: apps/marketing-site
        run: npm ci

      - name: Lint
        working-directory: apps/marketing-site
        run: npm run lint

      - name: Build
        working-directory: apps/marketing-site
        run: npm run build

      # ── Developer docs (WP6): build the Astro Starlight site and merge it into
      # the marketing-site output under `/docs` so both ship in one Pages
      # artifact (Strategy A). The docs app is part of the pnpm workspace, so it
      # needs its own install; marketing-site above uses npm + its own lockfile.
      - name: Setup pnpm (for docs)
        uses: pnpm/action-setup@v4
        with:
          version: 11.5.0

      - name: Setup Node.js (pnpm cache, for docs)
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: pnpm

      - name: Install workspace dependencies (for docs)
        run: pnpm install --frozen-lockfile

      - name: Build workspace (for docs TypeDoc)
        # starlight-typedoc resolves cross-package types from each package's
        # built `dist/*.d.ts`, so a docs build in a clean checkout fails without
        # the workspace built first. `db:generate` produces the Prisma client
        # that `@engram/database` compiles against (no live DB needed); the
        # Turbo `build` also emits apps/docs/dist for the merge below.
        run: |
          pnpm db:generate
          pnpm build

      - name: Merge docs into marketing-site output under /docs
        run: |
          mkdir -p apps/marketing-site/dist/docs
          cp -r apps/docs/dist/. apps/marketing-site/dist/docs/

      - name: Upload artifact
        # Upload from the gated build so the deploy job ships exactly what
        # passed lint/build (deploys only happen on push/dispatch below). The
        # copied dist/docs subtree rides along in the same artifact.
        if: github.event_name != 'pull_request'
        uses: actions/upload-pages-artifact@v3
        with:
          path: apps/marketing-site/dist

  deploy:
    # Production Pages deploy is gated on the verify job and never runs for
    # pull requests.
    needs: verify
    if: github.event_name != 'pull_request'
    env:
      MARKETING_SITE_DOMAIN: engram.events
    permissions:
      contents: read
      pages: write
      id-token: write
    concurrency:
      group: 'pages'
      cancel-in-progress: false
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      # Fail fast before configure/deploy: if the repository's Pages custom
      # domain has drifted from the expected value, block the deploy instead of
      # shipping a site that would serve an untrusted certificate.
      - name: Verify Pages custom domain binding
        uses: actions/github-script@v7
        with:
          script: |
            const expectedCname = process.env.MARKETING_SITE_DOMAIN;
            const { data } = await github.rest.repos.getPages({
              owner: context.repo.owner,
              repo: context.repo.repo,
            });

            core.info(`Pages html_url: ${data.html_url}`);
            core.info(`Pages custom domain: ${data.cname ?? '(none)'}`);
            core.info(`Pages https_enforced: ${data.https_enforced}`);

            if (data.cname !== expectedCname) {
              const runbookUrl = `https://github.com/${context.repo.owner}/${context.repo.repo}/blob/${context.sha}/docs/MARKETING_SITE_DOMAIN.md`;
              core.setFailed(
                `Expected Pages custom domain '${expectedCname}', found '${data.cname ?? '(none)'}'. See ${runbookUrl} for DNS/TLS setup instructions.`,
              );
            }

      - name: Setup Pages
        uses: actions/configure-pages@v5
        with:
          cname: ${{ env.MARKETING_SITE_DOMAIN }}

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
