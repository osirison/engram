services:
  postgres:
    image: pgvector/pgvector:pg17
    container_name: engram-postgres
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-engram}
      POSTGRES_USER: ${POSTGRES_USER:-engram}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-dev_password}
    ports:
      - '${POSTGRES_PORT:-5432}:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./docker/postgres/init.sql:/docker-entrypoint-initdb.d/init.sql
      - ./docker/postgres/10-web-readonly-role.sh:/docker-entrypoint-initdb.d/10-web-readonly-role.sh
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U ${POSTGRES_USER:-engram} -d ${POSTGRES_DB:-engram}']
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    networks:
      - engram-network

  redis:
    image: redis:latest
    container_name: engram-redis
    command: redis-server --appendonly yes
    ports:
      - '${REDIS_PORT:-6379}:6379'
    volumes:
      - redis_data:/data
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    networks:
      - engram-network

  qdrant:
    image: qdrant/qdrant:latest
    container_name: engram-qdrant
    ports:
      - '${QDRANT_HTTP_PORT:-6333}:6333' # HTTP API
      - '${QDRANT_GRPC_PORT:-6334}:6334' # gRPC API
    volumes:
      - qdrant_data:/qdrant/storage
    environment:
      QDRANT__SERVICE__HTTP_PORT: 6333
      QDRANT__SERVICE__GRPC_PORT: 6334
    healthcheck:
      test: ['CMD-SHELL', "timeout 5 bash -c '</dev/tcp/localhost/6333' || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    restart: unless-stopped
    networks:
      - engram-network

  # Local embedding models (default EMBEDDING_PROVIDER=ollama). Opt-in profile:
  # skip it if Ollama already runs on the host (https://ollama.com/download).
  #   docker compose --profile ollama up -d
  #   docker compose exec ollama ollama pull nomic-embed-text
  ollama:
    image: ollama/ollama:latest
    container_name: engram-ollama
    profiles: ['ollama']
    ports:
      - '${OLLAMA_PORT:-11434}:11434'
    volumes:
      - ollama_data:/root/.ollama
    healthcheck:
      test: ['CMD', 'ollama', 'ls']
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    restart: unless-stopped
    networks:
      - engram-network

volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local
  qdrant_data:
    driver: local
  ollama_data:
    driver: local

networks:
  engram-network:
    driver: bridge
