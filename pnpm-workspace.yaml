packages:
  - 'apps/*'
  - 'packages/*'

allowBuilds:
  '@nestjs/core': true
  '@prisma/client': true
  '@prisma/engines': true
  esbuild: true
  prisma: true
  sharp: true
  unrs-resolver: true

# Allow openai to use zod v4 (openai declares a peer dep on zod ^3 but only uses
# it for its optional structured-output helpers, which we don't use).
peerDependencyRules:
  allowedVersions:
    openai>zod: '4'
