packages:
  - 'apps/*'
  - '!apps/marketing-site'
  - 'packages/*'

allowBuilds:
  '@nestjs/core': true
  '@prisma/client': true
  '@prisma/engines': true
  esbuild: true
  prisma: true
  protobufjs: true
  sharp: true
  unrs-resolver: true

overrides:
  multer: '>=2.2.0'
  form-data: '>=4.0.6'
  undici: '>=6.27.0'
  hono: '>=4.12.25'

# Allow openai to use zod v4 (openai declares a peer dep on zod ^3 but only uses
# it for its optional structured-output helpers, which we don't use).
peerDependencyRules:
  allowedVersions:
    openai>zod: '4'
