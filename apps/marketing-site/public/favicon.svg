<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <!-- The engram mark: amber dot with a soft glow on the void (#0a0b0f),
       matching .mark-dot in index.html. -->
  <defs>
    <radialGradient id="glow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#F0B274" stop-opacity=".55"/>
      <stop offset="100%" stop-color="#F0B274" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <rect width="64" height="64" rx="14" fill="#0a0b0f"/>
  <circle cx="32" cy="32" r="24" fill="url(#glow)"/>
  <circle cx="32" cy="32" r="9" fill="#F0B274"/>
</svg>
